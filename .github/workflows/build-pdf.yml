name: Build White Paper PDF

on:
  push:
    paths:
      - 'whitepaper.tex'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Write build metadata
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "\\renewcommand{\\docbuild}{${SHORT_SHA}}" > build-info.tex
          echo "SHORT_SHA=${SHORT_SHA}" >> $GITHUB_ENV

      - name: Compile LaTeX
        uses: xu-cheng/latex-action@v3
        with:
          root_file: whitepaper.tex

      - name: Read document version
        run: |
          DOC_VERSION=$(grep -oP '\\newcommand\{\\docversion\}\{\K[^}]+' whitepaper.tex | head -n 1)
          echo "DOC_VERSION=${DOC_VERSION}" >> $GITHUB_ENV

      - name: Commit PDF to landscape repo
        run: |
          mv whitepaper.pdf oasa-whitepaper.pdf
          git config user.name "oa-sa-bot"
          git config user.email "bot@oa-sa.org"
          git add oasa-whitepaper.pdf
          if git diff --cached --quiet; then
            echo "No changes to PDF."
          else
            git commit -m "Rebuild white paper PDF v${DOC_VERSION} (build ${SHORT_SHA})"
            git push
          fi

      - name: Publish PDF to browse repo (website)
        run: |
          git clone https://x-access-token:${{ secrets.DATA_REPO_TOKEN }}@github.com/oa-sa/browse.git browse-repo
          cp oasa-whitepaper.pdf browse-repo/static/oasa-whitepaper.pdf
          cd browse-repo
          git config user.name "oa-sa-bot"
          git config user.email "bot@oa-sa.org"
          git add static/oasa-whitepaper.pdf
          if git diff --cached --quiet; then
            echo "No changes to publish."
          else
            git commit -m "Update white paper PDF v${DOC_VERSION} (build ${SHORT_SHA})"
            git push
          fi
